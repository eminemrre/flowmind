services:
  flowmind-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowmind-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://flowmind:securepassword@db:5432/flowmind
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - db
    networks:
      - flowmind-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:15-alpine
    container_name: flowmind-db
    restart: always
    environment:
      - POSTGRES_USER=flowmind
      - POSTGRES_PASSWORD=securepassword
      - POSTGRES_DB=flowmind
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flowmind-network

networks:
  flowmind-network:
    driver: bridge

volumes:
  postgres_data:
